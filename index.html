<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joe — Data Engineer</title>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      overflow: hidden;
      font-family: 'MS Sans Serif', Tahoma, Arial, sans-serif;
      font-size: 11px;
      background: #008080;
    }

    /* ── Scrollbars (Win95 style) ─────────────────────────── */
    ::-webkit-scrollbar { width: 16px; height: 16px; }
    ::-webkit-scrollbar-track { background: #c0c0c0; }
    ::-webkit-scrollbar-thumb {
      background: #c0c0c0;
      box-shadow:
        inset -1px -1px 0 #000000,
        inset  1px  1px 0 #ffffff,
        inset -2px -2px 0 #808080,
        inset  2px  2px 0 #dfdfdf;
    }
    ::-webkit-scrollbar-button {
      background: #c0c0c0;
      box-shadow:
        inset -1px -1px 0 #000000,
        inset  1px  1px 0 #ffffff,
        inset -2px -2px 0 #808080,
        inset  2px  2px 0 #dfdfdf;
      height: 16px; width: 16px; display: block;
    }
    ::-webkit-scrollbar-corner { background: #c0c0c0; }

    /* ── Selection ────────────────────────────────────────── */
    ::selection { background: #000080; color: white; }

    /* ── No text cursor on UI chrome ──────────────────────── */
    button { user-select: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="win95-components.jsx" data-presets="react"></script>
  <script type="text/babel" src="win95-apps.jsx"       data-presets="react"></script>
  <script type="text/babel" src="win95-minesweeper.jsx" data-presets="react"></script>
  <script type="text/babel" src="win95-main.jsx"        data-presets="react"></script>
</body>
</html>
